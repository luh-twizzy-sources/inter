databaseChangeLog:
  - changeSet:
      id: 001-create-items-table
      author: Yafimchyk
      changes:
        - createTable:
            tableName: items
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: decimal(10,2)
                  constraints:
                    nullable: false

        - createIndex:
            indexName: idx_items_name
            tableName: items
            columns:
              - column:
                  name: name

        - createIndex:
            indexName: idx_items_price
            tableName: items
            columns:
              - column:
                  name: price