databaseChangeLog:
  - changeSet:
      id: 002-create-orders-table
      author: Yafimchyk
      changes:
        - createTable:
            tableName: orders
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: creation_date
                  type: timestamp
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: user_email
                  type: varchar(255)
                  constraints:
                    nullable: false

        - createIndex:
            indexName: idx_orders_user_id
            tableName: orders
            columns:
              - column:
                  name: user_id

        - createIndex:
            indexName: idx_orders_status
            tableName: orders
            columns:
              - column:
                  name: status

        - createIndex:
            indexName: idx_orders_creation_date
            tableName: orders
            columns:
              - column:
                  name: creation_date

        - createIndex:
            indexName: idx_orders_user_email
            tableName: orders
            columns:
              - column:
                  name: user_email