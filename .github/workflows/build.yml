name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: MaksimYafimchyk
  SERVICES: "api-gateway auth-service user-service order-service payment-service"
  IMAGE_NAME: MaksimYafimchyk/internship

jobs:
  build-and-test:
    name: Build and Test Services
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      mongodb:
        image: mongo:6.0
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_DATABASE: payment

    strategy:
      matrix:
        service: [ api-gateway, user-service, auth-service, order-service, payment-service ]
        include:
          - service: api-gateway
            build_tool: maven
          - service: auth-service
            db_name: auth
            db_schema: auth_schema
            build_tool: maven
            env_db_url: jdbc:postgresql://localhost:5432/auth
            env_db_username: postgres
            env_db_password: postgres
            env_server_port: 8081
            env_user_service_url: http://localhost:8080
            env_jwt_secret: test_jwt_secret_change_me_please
            env_jwt_access_token_expiration: 3600000
            env_jwt_refresh_token_expiration: 2592000000
          - service: user-service
            db_name: internship
            db_schema: user_schema
            build_tool: maven
            env_db_url: jdbc:postgresql://localhost:5432/internship
            env_db_username: postgres
            env_db_password: postgres
            env_server_port: 8080
            env_redis_host: localhost
            env_redis_port: 6379
            env_redis_password: ""
            env_redis_database: 0
          - service: order-service
            db_name: order_db
            db_schema: order_schema
            build_tool: gradle
          - service: payment-service
            db_name: payment
            build_tool: maven
            needs_mongo: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make gradlew executable
        if: matrix.service == 'order-service'
        run: |
          cd order-service
          chmod +x ./gradlew

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: ${{ matrix.build_tool }}

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Wait for MongoDB to be ready
        if: matrix.service == 'payment-service'
        run: |
          echo "Waiting for MongoDB to be ready..."
          timeout 30s bash -c 'until echo > /dev/tcp/localhost/27017; do sleep 1; done' || exit 1
          echo "MongoDB is ready!"

      - name: Create database and schema
        if: matrix.service != 'api-gateway' && matrix.service != 'payment-service'
        run: |
          psql postgresql://postgres:postgres@localhost:5432/postgres -c "CREATE DATABASE ${{ matrix.db_name }};"
          psql postgresql://postgres:postgres@localhost:5432/${{ matrix.db_name }} -c "CREATE SCHEMA IF NOT EXISTS ${{ matrix.db_schema }};"
          psql postgresql://postgres:postgres@localhost:5432/postgres -c "\l" | grep ${{ matrix.db_name }}
          psql postgresql://postgres:postgres@localhost:5432/${{ matrix.db_name }} -c "\dn" | grep ${{ matrix.db_schema }}

      - name: Create database for payment-service
        if: matrix.service == 'payment-service'
        run: |
          psql postgresql://postgres:postgres@localhost:5432/postgres -c "CREATE DATABASE ${{ matrix.db_name }};"
          psql postgresql://postgres:postgres@localhost:5432/postgres -c "\l" | grep ${{ matrix.db_name }}

      - name: Build service
        run: |
          cd ${{ matrix.service }}
          if [ "${{ matrix.build_tool }}" = "maven" ]; then
            mvn clean compile -DskipTests
          else
            ./gradlew compileJava -x test
          fi

      - name: Run unit tests for order-service
        if: matrix.service == 'order-service'
        run: |
          cd order-service
          ./gradlew test --tests "com.internship.order_service.unit.*"

      - name: Run integration tests for payment-service
        if: matrix.service == 'payment-service'
        run: |
          cd payment-service
          export MAVEN_OPTS="-Xmx2g -XX:MaxMetaspaceSize=1g -Dspring.test.timeout=300000"
          mvn test -Dtest=*IntegrationTest \
                   -Dspring.test.timeout=300000 \
                   -Dspring.main.lazy-initialization=true \
                   -Dmaven.test.failure.ignore=false \
                   -Dtestcontainers.reuse.enable=true

      - name: Run unit tests for payment-service
        if: matrix.service == 'payment-service'
        run: |
          cd payment-service
          mvn test -Dtest=!*IntegrationTest

      - name: Run tests with JaCoCo
        if: matrix.service == 'user-service' || matrix.service == 'auth-service'
        env:
          DB_URL: ${{ matrix.env_db_url }}
          DB_USERNAME: ${{ matrix.env_db_username }}
          DB_PASSWORD: ${{ matrix.env_db_password }}
          SERVER_PORT: ${{ matrix.env_server_port }}
          USER_SERVICE_URL: ${{ matrix.env_user_service_url }}
          JWT_SECRET: ${{ matrix.env_jwt_secret }}
          JWT_ACCESS_TOKEN_EXPIRATION: ${{ matrix.env_jwt_access_token_expiration }}
          JWT_REFRESH_TOKEN_EXPIRATION: ${{ matrix.env_jwt_refresh_token_expiration }}
          REDIS_HOST: ${{ matrix.env_redis_host }}
          REDIS_PORT: ${{ matrix.env_redis_port }}
          REDIS_PASSWORD: ${{ matrix.env_redis_password }}
          REDIS_DATABASE: ${{ matrix.env_redis_database }}
        run: |
          cd ${{ matrix.service }}
          if [ "${{ matrix.build_tool }}" = "maven" ]; then
            mvn clean test jacoco:report -Djacoco.destDir=target/site/jacoco
          else
            ./gradlew test jacocoTestReport
          fi

      - name: Run tests without JaCoCo
        if: matrix.service != 'user-service' && matrix.service != 'auth-service' && matrix.service != 'api-gateway' && matrix.service != 'order-service' && matrix.service != 'payment-service'
        run: |
          cd ${{ matrix.service }}
          if [ "${{ matrix.build_tool }}" = "maven" ]; then
            mvn clean test -DskipTests=false
          else
            ./gradlew test
          fi

      - name: Verify database connectivity
        if: matrix.service != 'api-gateway' && matrix.service != 'payment-service'
        run: |
          echo "Testing connection to database: ${{ matrix.db_name }}"
          psql postgresql://postgres:postgres@localhost:5432/${{ matrix.db_name }} -c "SELECT current_database(), current_schema();"

      - name: Verify MongoDB connectivity
        if: matrix.service == 'payment-service'
        run: |
          echo "Testing connection to MongoDB"
          timeout 5s bash -c 'until echo > /dev/tcp/localhost/27017; do sleep 1; done' || exit 1

  code-analysis:
    name: Code Analysis
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build services for Sonar
        run: |
          cd user-service && mvn clean verify -DskipTests
          cd ../auth-service && mvn clean verify -DskipTests

      - name: SonarQube Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          cd user-service
          mvn sonar:sonar \
            -Dsonar.organization=kless31332 \
            -Dsonar.projectKey=kless3_internship \
            -Dsonar.projectName='User Service' \
            -Dsonar.qualitygate.wait=false \
            -Dsonar.issue.ignore.multicriteria=e1 \
            -Dsonar.issue.ignore.multicriteria.e1.ruleKey=squid:S00116 \
            -Dsonar.issue.ignore.multicriteria.e1.resourceKey=**/*
          
          cd ../auth-service
          mvn sonar:sonar \
            -Dsonar.organization=kless31332 \
            -Dsonar.projectKey=kless3_internship \
            -Dsonar.projectName='Auth Service' \
            -Dsonar.qualitygate.wait=false \
            -Dsonar.issue.ignore.multicriteria=e1 \
            -Dsonar.issue.ignore.multicriteria.e1.ruleKey=squid:S00116 \
            -Dsonar.issue.ignore.multicriteria.e1.resourceKey=**/*

  docker-build:
    name: Artifact Creation
    runs-on: ubuntu-latest
    needs: code-analysis
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [ api-gateway, user-service, auth-service, order-service, payment-service ]
        include:
          - service: api-gateway
            build_tool: maven
            context: ./api-gateway
            port: 8080
          - service: auth-service
            build_tool: maven
            context: ./auth-service
            port: 8081
          - service: user-service
            build_tool: maven
            context: ./user-service
            port: 8083
          - service: order-service
            build_tool: gradle
            context: ./order-service
            port: 8082
          - service: payment-service
            build_tool: maven
            context: ./payment-service
            port: 8084

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: ${{ matrix.build_tool }}

      - name: Make gradlew executable
        if: matrix.service == 'order-service'
        run: |
          cd order-service
          chmod +x ./gradlew

      - name: Build service
        run: |
          cd ${{ matrix.service }}
          if [ "${{ matrix.build_tool }}" = "maven" ]; then
            mvn clean package -DskipTests
          else
            ./gradlew build -x test
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest

      - name: Build and push Docker image for ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload Docker artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ matrix.service }}
          path: ${{ matrix.context }}
          overwrite: true

      - name: Generate deployment manifest
        run: |
          cat > docker-compose.prod.yml << EOF
          version: '3.8'
          services:
            api-gateway:
              image: ghcr.io/${{ github.repository_owner }}/api-gateway:latest
              ports: ["8080:8080"]
            user-service:
              image: ghcr.io/${{ github.repository_owner }}/user-service:latest
              ports: ["8083:8080"]
            auth-service:
              image: ghcr.io/${{ github.repository_owner }}/auth-service:latest
              ports: ["8081:8081"]
            order-service:
              image: ghcr.io/${{ github.repository_owner }}/order-service:latest
              ports: ["8082:8082"]
            payment-service:
              image: ghcr.io/${{ github.repository_owner }}/payment-service:latest
              ports: ["8084:8084"]
          EOF

      - name: Upload deployment manifest
        uses: actions/upload-artifact@v4
        with:
          name: deployment-manifest
          path: docker-compose.prod.yml
          retention-days: 30
          overwrite: true
