spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  sql:
    init:
      mode: always
  cache:
    type: redis
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
        shutdown-timeout: 10000ms
  testcontainers:
    reuse:
      enable: false

logging:
  level:
    com.internship.user_service: DEBUG
    org.testcontainers: INFO
    org.springframework.data.redis: DEBUG
    io.lettuce.core: WARN